buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
        maven { url "https://www.jitpack.io" }
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        // ← ADD THIS
        classpath("com.google.android.gms:play-services-maps:18.2.0")
    }
}

apply plugin: "com.facebook.react.rootproject"

subprojects { subproject ->
    def isWindows = org.gradle.internal.os.OperatingSystem.current().isWindows()
    def isNodeModulesLibrary = subproject.projectDir.absolutePath.contains("${File.separator}node_modules${File.separator}")

    if (isWindows && isNodeModulesLibrary) {
        subproject.tasks.configureEach { task ->
            def snapshotsNativeOutputs =
                task.name.startsWith("buildCMake") ||
                task.name.startsWith("externalNativeBuild") ||
                task.name.startsWith("prefab") ||
                task.name.startsWith("merge") && task.name.endsWith("NativeLibs")

            if (snapshotsNativeOutputs) {
                // Gradle 9 on Windows can't snapshot the reparse-point .so files
                // emitted by some React Native library native build tasks.
                task.doNotTrackState("Work around unreadable native library outputs on Windows.")
            }
        }
    }
}
